name: Bug Report
description: Report a bug in Aegis
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **WARNING: Do NOT include private keys, API keys, wallet addresses with significant holdings, or other sensitive information.**

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear summary of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. macOS 15.3, Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node Version
      placeholder: e.g. 20.11.0
    validations:
      required: true

  - type: input
    id: aegis_version
    attributes:
      label: aegis-defi Version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: input
    id: chain_id
    attributes:
      label: Chain ID
      description: The chain ID where the issue occurred.
      placeholder: e.g. 1, 137, 42161
    validations:
      required: false
